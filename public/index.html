<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlackLite</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  <!-- 로그인 / 회원가입 -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-card">
      <h1 class="auth-logo">💬 SlackLite</h1>
      <p class="auth-subtitle">오픈소스 팀 메신저</p>
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button">로그인</button>
        <button id="tab-register" class="auth-tab" type="button">회원가입</button>
      </div>
      <form id="auth-form">
        <label class="field">
          <span>아이디</span>
          <input id="auth-username" type="text" autocomplete="username" required
                 placeholder="영문 소문자, 숫자, _.-">
        </label>
        <label class="field hidden" id="field-display-name">
          <span>표시 이름</span>
          <input id="auth-display-name" type="text" autocomplete="nickname" placeholder="예: 김준호">
        </label>
        <label class="field">
          <span>비밀번호</span>
          <input id="auth-password" type="password" autocomplete="current-password" required
                 placeholder="4자 이상">
        </label>
        <label class="field hidden" id="field-invite">
          <span>초대 코드</span>
          <input id="auth-invite" type="text" autocomplete="off" placeholder="관리자에게 받은 초대 코드">
        </label>
        <p id="auth-error" class="auth-error hidden"></p>
        <button id="auth-submit" class="auth-submit" type="submit">로그인</button>
      </form>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="workspace-name">SlackLite</span>
        <button id="btn-logout" class="icon-btn" title="로그아웃">↩</button>
      </div>
      <div class="sidebar-me">
        <span id="me-avatar" class="avatar avatar-sm"></span>
        <span id="me-name" class="me-name"></span>
        <span class="presence-dot online"></span>
      </div>
      <div class="sidebar-search">
        <input id="search-input" type="text" placeholder="메시지 검색">
      </div>
      <nav class="sidebar-scroll">
        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>채널</span>
            <button id="btn-new-channel" class="icon-btn" title="채널 만들기">＋</button>
          </div>
          <ul id="channel-list" class="sidebar-list"></ul>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-header">
            <span>다이렉트 메시지</span>
          </div>
          <ul id="dm-list" class="sidebar-list"></ul>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="channel-header">
        <div class="channel-title-wrap">
          <h2 id="channel-title" class="channel-title"></h2>
          <span id="channel-topic" class="channel-topic"></span>
        </div>
        <span id="channel-members" class="channel-members"></span>
      </header>
      <div id="message-list" class="message-list"></div>
      <div id="typing-indicator" class="typing-indicator"></div>
      <div class="composer">
        <textarea id="composer-input" rows="1" placeholder="메시지 보내기"></textarea>
        <button id="composer-send" class="composer-send" title="보내기">➤</button>
      </div>
    </main>

    <aside id="thread-panel" class="thread-panel hidden">
      <header class="thread-header">
        <span>스레드</span>
        <button id="btn-close-thread" class="icon-btn" title="닫기">✕</button>
      </header>
      <div id="thread-messages" class="message-list thread-messages"></div>
      <div class="composer thread-composer">
        <textarea id="thread-input" rows="1" placeholder="답글 남기기"></textarea>
        <button id="thread-send" class="composer-send" title="보내기">➤</button>
      </div>
    </aside>

    <aside id="search-panel" class="thread-panel hidden">
      <header class="thread-header">
        <span id="search-title">검색 결과</span>
        <button id="btn-close-search" class="icon-btn" title="닫기">✕</button>
      </header>
      <div id="search-results" class="message-list thread-messages"></div>
    </aside>
  </div>

  <!-- 채널 생성 모달 -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal">
      <h3>채널 만들기</h3>
      <form id="new-channel-form">
        <label class="field">
          <span>이름</span>
          <input id="new-channel-name" type="text" required placeholder="예: 프로젝트-알파" maxlength="40">
        </label>
        <label class="field">
          <span>주제 (선택)</span>
          <input id="new-channel-topic" type="text" placeholder="이 채널의 용도" maxlength="200">
        </label>
        <p id="new-channel-error" class="auth-error hidden"></p>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-channel" class="btn-secondary">취소</button>
          <button type="submit" class="btn-primary">만들기</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
